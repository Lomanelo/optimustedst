[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "18"
  NPM_VERSION = "9"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Consolidated redirects: force HTTPS and non-www in a single hop
[[redirects]]
  from = "http://optimusksa.com/*"
  to = "https://optimus-solutions.org/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.optimusksa.com/*"
  to = "https://optimus-solutions.org/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.optimusksa.com/*"
  to = "https://optimus-solutions.org/:splat"
  status = 301
  force = true

